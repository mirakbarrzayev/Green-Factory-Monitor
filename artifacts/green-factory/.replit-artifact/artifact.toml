kind = "web"
previewPath = "/"
title = "Green Factory Dashboard"
version = "1.0.0"
id = "artifacts/green-factory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26113

[services.development]
run = "pnpm --filter @workspace/green-factory run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/green-factory", "run", "build" ]
publicDir = "artifacts/green-factory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26113"
BASE_PATH = "/"
